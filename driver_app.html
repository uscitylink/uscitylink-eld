<!DOCTYPE html>
<html>
<head>
    <title>US Citylink ELD Driver App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #38bdf8; }

        .box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin: 5px;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        #map {
            height: 500px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>US Citylink ELD Driver App</h1>

<div class="box">
    <h3>Driver / Vehicle</h3>

    <label>Driver:</label><br>
    <select id="driver_id"></select>

    <br><br>

    <label>Vehicle:</label><br>
    <select id="vehicle_id"></select>
</div>

<div class="box">
    <h3>Current Driver Status</h3>
    <p id="status">LIVE GPS CONNECTED</p>
</div>

<button onclick="loadFleet()">Refresh Map</button>

<h3>Fleet Map + Route History</h3>
<div id="map"></div>

<p id="map-status" style="color:red;"></p>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = window.location.origin;

var map = L.map("map").setView([36, -119], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
}).addTo(map);

let markers = [];

async function loadDriverDropdown() {
    try {
        const response = await fetch(`${API}/api/admin/drivers`);
        const drivers = await response.json();

        const select = document.getElementById("driver_id");
        select.innerHTML = "";

        if (!Array.isArray(drivers) || drivers.length === 0) {
            select.innerHTML = `<option>No drivers found</option>`;
            return;
        }

        drivers.forEach(d => {
            const option = document.createElement("option");
            option.value = d.driver_id;
            option.textContent = `${d.name} (${d.driver_id})`;
            select.appendChild(option);
        });

    } catch (error) {
        console.log("Driver dropdown error:", error);
    }
}

async function loadVehicleDropdown() {
    try {
        const response = await fetch(`${API}/api/samsara/gps`);
        const vehicles = await response.json();

        const select = document.getElementById("vehicle_id");
        select.innerHTML = "";

        if (!Array.isArray(vehicles) || vehicles.length === 0) {
            select.innerHTML = `<option>No vehicles found</option>`;
            return;
        }

        const seen = {};

        vehicles.forEach(v => {
            if (!v.vehicle_id) return;
            if (seen[v.vehicle_id]) return;

            seen[v.vehicle_id] = true;

            const option = document.createElement("option");
            option.value = v.vehicle_id;
            option.textContent = v.vehicle_id;
            select.appendChild(option);
        });

    } catch (error) {
        console.log("Vehicle dropdown error:", error);
    }
}

async function loadFleet() {
    try {
        const res = await fetch(`${API}/api/samsara/gps`);
        const data = await res.json();

        markers.forEach(m => map.removeLayer(m));
        markers = [];

        if (!Array.isArray(data)) {
            document.getElementById("map-status").innerText = "API error";
            return;
        }

        data.forEach(truck => {
            if (!truck.latitude || !truck.longitude) return;

            const marker = L.marker([truck.latitude, truck.longitude])
                .addTo(map)
                .bindPopup(
                    "<b>" + truck.vehicle_id + "</b><br>" +
                    "Speed: " + truck.speed + " mph<br>" +
                    "Time: " + truck.time
                );

            markers.push(marker);
        });

        document.getElementById("map-status").innerText = "";

    } catch (err) {
        console.error(err);
        document.getElementById("map-status").innerText = "Map error";
    }
}

window.onload = async function() {
    await loadDriverDropdown();
    await loadVehicleDropdown();
    await loadFleet();
};

setInterval(loadFleet, 10000);
</script>

</body>
</html>
