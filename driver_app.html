<!DOCTYPE html>
<html>
<head>
    <title>US Citylink ELD Driver App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        #map {
            height: 500px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>US Citylink ELD Driver App</h1>

<div class="box">
    <h3>Current Driver Status</h3>
    <p id="status">LIVE GPS CONNECTED</p>
</div>

<button onclick="loadFleet()">Refresh</button>

<h3>Fleet Map + Route History</h3>

<div id="map"></div>

<p id="map-status" style="color:red;"></p>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

    // Create map
    var map = L.map('map').setView([36, -119], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Store markers
    let markers = [];

    // Load Samsara GPS
    async function loadFleet() {
        try {
            const res = await fetch("https://uscitylink-eld.onrender.com/api/samsara/gps");
            const data = await res.json();

            console.log(data);

            // Clear old markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            if (!Array.isArray(data)) {
                document.getElementById("map-status").innerText = "API error";
                return;
            }

            data.forEach(truck => {
                if (!truck.latitude || !truck.longitude) return;

                const marker = L.marker([truck.latitude, truck.longitude])
                    .addTo(map)
                    .bindPopup(
                        "<b>" + truck.vehicle_id + "</b><br>" +
                        "Speed: " + truck.speed + " mph<br>" +
                        "Time: " + truck.time
                    );

                markers.push(marker);
            });

            document.getElementById("map-status").innerText = "";

        } catch (err) {
            console.error(err);
            document.getElementById("map-status").innerText = "Map error";
        }
    }

    // Run on load
    loadFleet();

    // Auto refresh every 10 sec
    setInterval(loadFleet, 10000);

</script>

</body>
</html>
