<!DOCTYPE html>
<html>
<head>
<title>US Citylink Login</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
    color: white;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    background: #1e293b;
    padding: 35px;
    border-radius: 16px;
    width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
}

.logo {
    font-size: 30px;
    font-weight: bold;
    color: #38bdf8;
    margin-bottom: 8px;
}

.subtitle {
    color: #cbd5e1;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-top: 15px;
    margin-bottom: 6px;
    color: #e5e7eb;
}

input {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 25px;
    padding: 14px;
    background: #16a34a;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 17px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #15803d;
}

#error {
    margin-top: 15px;
    color: #fca5a5;
    font-weight: bold;
}

#success {
    margin-top: 15px;
    color: #86efac;
    font-weight: bold;
}

.footer {
    margin-top: 25px;
    font-size: 13px;
    color: #94a3b8;
    text-align: center;
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">US Citylink ELD</div>
    <div class="subtitle">Secure Driver & Dispatcher Login</div>

    <label>Username</label>
    <input id="username" placeholder="Enter username">

    <label>Password</label>
    <input id="password" type="password" placeholder="Enter password">

    <button onclick="login()">LOGIN</button>

    <div id="error"></div>
    <div id="success"></div>

    <div class="footer">
        Electronic Logging Device System
    </div>
</div>

<script>
const API = window.location.origin;

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    document.getElementById("error").textContent = "";
    document.getElementById("success").textContent = "";

    if (!username || !password) {
        document.getElementById("error").textContent = "Please enter username and password.";
        return;
    }

    const url = `${API}/api/auth/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;

    const response = await fetch(url, { method: "POST" });
    const data = await response.json();

    if (data.error) {
        document.getElementById("error").textContent = data.error;
        return;
    }

    localStorage.setItem("eld_username", data.username);
    localStorage.setItem("eld_role", data.role);
    localStorage.setItem("eld_driver_id", data.driver_id || "");

    document.getElementById("success").textContent = "Login successful. Redirecting...";

    setTimeout(() => {
        if (data.role === "DRIVER") {
            window.location.href = "/app/driver_app.html";
        } else if (data.role === "DISPATCHER") {
            window.location.href = "/app/dispatcher_dashboard.html";
        } else if (data.role === "ADMIN") {
            window.location.href = "/app/admin_management.html";
        }
    }, 700);
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        login();
    }
});
</script>

</body>
</html>
