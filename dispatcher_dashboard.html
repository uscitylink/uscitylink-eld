<!DOCTYPE html>
<html>
<head>
    <title>Dispatcher Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #020617;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .panel {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        #map {
            height: 520px;
            border-radius: 10px;
            margin-top: 20px;
        }

        #mapStatus {
            margin-top: 10px;
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🚛 Dispatcher Dashboard</h1>

<div class="panel">
    <h3>Assign Driver</h3>

    <select id="driverSelect"></select>
    <select id="vehicleSelect"></select>

    <button onclick="assign()">Assign Driver to Vehicle</button>

    <p id="assignStatus">Assigned →</p>
</div>

<h3>Live Fleet Map</h3>
<div id="map"></div>
<p id="mapStatus">Loading trucks...</p>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = window.location.origin;

let map = L.map("map").setView([39.5, -98.35], 5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
}).addTo(map);

let markers = [];

// Load drivers
async function loadDrivers() {
    try {
        const res = await fetch(`${API}/api/admin/drivers`);
        const data = await res.json();

        const select = document.getElementById("driverSelect");
        select.innerHTML = "";

        data.forEach(d => {
            const option = document.createElement("option");
            option.value = d.driver_id;
            option.textContent = `${d.name} (${d.driver_id})`;
            select.appendChild(option);
        });
    } catch (err) {
        console.error("Driver load error:", err);
    }
}

// Load vehicles
async function loadVehicles() {
    try {
        const res = await fetch(`${API}/api/admin/vehicles`);
        const data = await res.json();

        const select = document.getElementById("vehicleSelect");
        select.innerHTML = "";

        data.forEach(v => {
            const option = document.createElement("option");
            option.value = v.vehicle_id;
            option.textContent = v.vehicle_id;
            select.appendChild(option);
        });
    } catch (err) {
        console.error("Vehicle load error:", err);
    }
}

// Simple assignment display
function assign() {
    const driver = document.getElementById("driverSelect").value;
    const vehicle = document.getElementById("vehicleSelect").value;

    document.getElementById("assignStatus").textContent =
        `Assigned ${driver} → ${vehicle}`;
}

// Load Samsara trucks
async function loadFleet() {
    try {
        const res = await fetch(`${API}/api/samsara/gps`);
        const data = await res.json();

        if (!Array.isArray(data)) {
            document.getElementById("mapStatus").textContent =
                "API error: " + JSON.stringify(data);
            return;
        }

        // Clear old markers
        markers.forEach(marker => map.removeLayer(marker));
        markers = [];

        // Keep only latest record per truck
        const latest = {};

        data.forEach(truck => {
            if (!truck.vehicle_id || !truck.latitude || !truck.longitude) return;

            const id = truck.vehicle_id;

            if (!latest[id]) {
                latest[id] = truck;
            } else {
                const oldTime = new Date(latest[id].time || 0);
                const newTime = new Date(truck.time || 0);

                if (newTime > oldTime) {
                    latest[id] = truck;
                }
            }
        });

        const trucks = Object.values(latest);
        let count = 0;

        trucks.forEach(truck => {
            const lat = parseFloat(truck.latitude);
            const lon = parseFloat(truck.longitude);

            if (isNaN(lat) || isNaN(lon)) return;

            count++;

            const marker = L.marker([lat, lon])
                .addTo(map)
                .bindPopup(
                    `<b>Truck:</b> ${truck.vehicle_id}<br>
                     <b>Speed:</b> ${truck.speed || 0} mph<br>
                     <b>Time:</b> ${truck.time || ""}<br>
                     <b>GPS:</b> ${lat}, ${lon}`
                );

            markers.push(marker);
        });

        document.getElementById("mapStatus").textContent =
            `Showing latest location for ${count} truck(s).`;

    } catch (err) {
        console.error("Fleet map error:", err);
        document.getElementById("mapStatus").textContent = "Map error.";
    }
}

// Start
loadDrivers();
loadVehicles();
loadFleet();

// Refresh every 10 seconds
setInterval(loadFleet, 10000);
</script>

</body>
</html>
