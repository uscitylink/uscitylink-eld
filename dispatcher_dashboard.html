<!DOCTYPE html>
<html>
<head>
    <title>Dispatcher Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #020617;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .panel {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px;
            margin: 6px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .btn-blue {
            background: #2563eb;
        }

        .btn-orange {
            background: #f59e0b;
        }

        .btn-red {
            background: #dc2626;
        }

        #map {
            height: 540px;
            border-radius: 10px;
            margin-top: 20px;
        }

        #mapStatus {
            margin-top: 10px;
            color: #22c55e;
            font-weight: bold;
        }

        .alert-box {
            background: #7f1d1d;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }

        .alert-yellow {
            background: #78350f;
        }

        table {
            width: 100%;
            background: white;
            color: black;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            font-size: 13px;
        }

        th {
            background: #e5e7eb;
        }
    </style>
</head>

<body>

<h1>🚛 Dispatcher Dashboard</h1>

<div class="panel">
    <h3>Assign Driver to Vehicle</h3>

    <select id="driverSelect"></select>
    <select id="vehicleSelect"></select>

    <button onclick="assign()">SAVE ASSIGNMENT</button>

    <p id="assignStatus">No assignment yet.</p>
</div>

<div class="panel">
    <h3>Active Assignments</h3>
    <button class="btn-blue" onclick="loadAssignments()">REFRESH ASSIGNMENTS</button>

    <table>
        <thead>
            <tr>
                <th>Driver ID</th>
                <th>Vehicle ID</th>
                <th>Assigned At</th>
                <th>Active</th>
            </tr>
        </thead>
        <tbody id="assignmentBody"></tbody>
    </table>
</div>

<div class="panel">
    <h3>⚠️ Alerts</h3>
    <button class="btn-red" onclick="clearAlerts()">CLEAR ALERTS</button>
    <div id="alerts"></div>
</div>

<h3>Live Fleet Map</h3>

<button class="btn-blue" onclick="loadFleet()">REFRESH MAP</button>
<button class="btn-orange" onclick="showRoute()">SHOW ROUTE TRAIL</button>
<button onclick="clearRoute()">CLEAR ROUTE</button>

<div id="map"></div>
<p id="mapStatus">Loading trucks...</p>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = window.location.origin;

let map = L.map("map").setView([39.5, -98.35], 5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
}).addTo(map);

let markers = [];
let assignmentMap = {};
let routeLine = null;
let routeMarkers = [];
let idleTracker = {};
let alertMemory = {};

function showAlert(text, type = "red") {
    const key = text;

    const now = Date.now();
    if (alertMemory[key] && now - alertMemory[key] < 60000) {
        return;
    }

    alertMemory[key] = now;

    const div = document.getElementById("alerts");

    const box = document.createElement("div");
    box.className = type === "yellow" ? "alert-box alert-yellow" : "alert-box";
    box.textContent = text;

    div.prepend(box);
}

function clearAlerts() {
    document.getElementById("alerts").innerHTML = "";
    alertMemory = {};
}

async function loadDrivers() {
    try {
        const res = await fetch(`${API}/api/admin/drivers`);
        const data = await res.json();

        const select = document.getElementById("driverSelect");
        select.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            select.innerHTML = "<option value=''>No drivers found</option>";
            return;
        }

        data.forEach(d => {
            const option = document.createElement("option");
            option.value = d.driver_id;
            option.textContent = `${d.name} (${d.driver_id})`;
            select.appendChild(option);
        });

    } catch (err) {
        console.error("Driver load error:", err);
    }
}

async function loadVehicles() {
    try {
        const res = await fetch(`${API}/api/samsara/gps`);
        const data = await res.json();

        const select = document.getElementById("vehicleSelect");
        const oldValue = select.value;
        select.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            select.innerHTML = "<option value=''>No vehicles found</option>";
            return;
        }

        const latest = {};

        data.forEach(v => {
            if (!v.vehicle_id) return;

            if (!latest[v.vehicle_id]) {
                latest[v.vehicle_id] = v;
            } else {
                const oldTime = new Date(latest[v.vehicle_id].time || 0);
                const newTime = new Date(v.time || 0);

                if (newTime > oldTime) {
                    latest[v.vehicle_id] = v;
                }
            }
        });

        Object.values(latest).forEach(v => {
            const option = document.createElement("option");
            option.value = v.vehicle_id;
            option.textContent = v.vehicle_id;
            option.dataset.sid = v.samsara_vehicle_id || "";
            select.appendChild(option);
        });

        if (oldValue) {
            select.value = oldValue;
        }

    } catch (err) {
        console.error("Vehicle load error:", err);
    }
}

async function assign() {
    try {
        const driver = document.getElementById("driverSelect").value;
        const vehicle = document.getElementById("vehicleSelect").value;

        if (!driver || !vehicle) {
            alert("Select driver and vehicle first.");
            return;
        }

        const res = await fetch(
            `${API}/api/assignment/create?driver_id=${encodeURIComponent(driver)}&vehicle_id=${encodeURIComponent(vehicle)}`,
            { method: "POST" }
        );

        const data = await res.json();

        document.getElementById("assignStatus").textContent =
            (data.message || "Saved") + ": " + driver + " → " + vehicle;

        await loadAssignments();
        await loadFleet();

    } catch (err) {
        console.error("Assign error:", err);
        alert("Assignment error.");
    }
}

async function loadAssignments() {
    try {
        const res = await fetch(`${API}/api/assignment/active`);
        const data = await res.json();

        assignmentMap = {};

        const body = document.getElementById("assignmentBody");
        body.innerHTML = "";

        if (!Array.isArray(data)) {
            body.innerHTML = `<tr><td colspan="4">Assignment API error</td></tr>`;
            return;
        }

        if (data.length === 0) {
            body.innerHTML = `<tr><td colspan="4">No active assignments</td></tr>`;
            return;
        }

        data.forEach(a => {
            assignmentMap[a.vehicle_id] = a.driver_id;

            body.innerHTML += `
                <tr>
                    <td>${a.driver_id}</td>
                    <td>${a.vehicle_id}</td>
                    <td>${a.assigned_at}</td>
                    <td>${a.active}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.error("Assignment load error:", err);
    }
}

async function saveGpsPoints() {
    try {
        await fetch(`${API}/api/samsara/save-gps`, {
            method: "POST"
        });
    } catch (err) {
        console.error("Save GPS error:", err);
    }
}

function checkAlerts(truck) {
    const vehicleId = truck.vehicle_id;
    const speed = Number(truck.speed || 0);

    if (speed > 76) {
        showAlert(`🚨 SPEEDING: ${vehicleId} is going ${speed} mph`, "red");
    }

    if (speed === 0) {
        if (!idleTracker[vehicleId]) {
            idleTracker[vehicleId] = Date.now();
        } else {
            const idleSeconds = Math.floor((Date.now() - idleTracker[vehicleId]) / 1000);

            if (idleSeconds > 3600) {
                showAlert(`⚠️ IDLE: ${vehicleId} has been idle for ${idleSeconds} seconds`, "yellow");
            }
        }
    } else {
        idleTracker[vehicleId] = null;
    }
}

async function loadFleet() {
    try {
        await loadAssignments();
        await saveGpsPoints();

        const res = await fetch(`${API}/api/samsara/gps`);
        const data = await res.json();

        if (!Array.isArray(data)) {
            document.getElementById("mapStatus").textContent =
                "API error: " + JSON.stringify(data);
            return;
        }

        markers.forEach(marker => map.removeLayer(marker));
        markers = [];

        const latest = {};

        data.forEach(truck => {
            if (!truck.vehicle_id || !truck.latitude || !truck.longitude) return;

            if (!latest[truck.vehicle_id]) {
                latest[truck.vehicle_id] = truck;
            } else {
                const oldTime = new Date(latest[truck.vehicle_id].time || 0);
                const newTime = new Date(truck.time || 0);

                if (newTime > oldTime) {
                    latest[truck.vehicle_id] = truck;
                }
            }
        });

        let count = 0;

        Object.values(latest).forEach(truck => {
            const lat = parseFloat(truck.latitude);
            const lon = parseFloat(truck.longitude);

            if (isNaN(lat) || isNaN(lon)) return;

            count++;

            checkAlerts(truck);

            const assignedDriver = assignmentMap[truck.vehicle_id] || "Unassigned";

            const marker = L.marker([lat, lon])
                .addTo(map)
                .bindPopup(
                    `<b>Truck:</b> ${truck.vehicle_id}<br>
                     <b>Assigned Driver:</b> ${assignedDriver}<br>
                     <b>Speed:</b> ${truck.speed || 0} mph<br>
                     <b>Time:</b> ${truck.time || ""}<br>
                     <b>GPS:</b> ${lat}, ${lon}`
                );

            markers.push(marker);
        });

        document.getElementById("mapStatus").textContent =
            `Showing latest location for ${count} truck(s). GPS trail is saving automatically.`;

    } catch (err) {
        console.error("Fleet map error:", err);
        document.getElementById("mapStatus").textContent = "Map error.";
    }
}

async function showRoute() {
    try {
        const vehicleId = document.getElementById("vehicleSelect").value;

        if (!vehicleId) {
            alert("Select vehicle first.");
            return;
        }

        clearRoute();

        const res = await fetch(`${API}/api/gps/route?vehicle_id=${encodeURIComponent(vehicleId)}&limit=500`);
        const data = await res.json();

        if (!Array.isArray(data)) {
            alert("Route API error: " + JSON.stringify(data));
            return;
        }

        const points = [];

        data.forEach(p => {
            if (!p.latitude || !p.longitude) return;

            const lat = parseFloat(p.latitude);
            const lon = parseFloat(p.longitude);

            if (isNaN(lat) || isNaN(lon)) return;

            points.push([lat, lon]);

            const marker = L.circleMarker([lat, lon], {
                radius: 4
            }).addTo(map);

            marker.bindPopup(
                `<b>Truck:</b> ${p.vehicle_id}<br>
                 <b>Speed:</b> ${p.speed || 0} mph<br>
                 <b>Time:</b> ${p.time || ""}`
            );

            routeMarkers.push(marker);
        });

        if (points.length === 0) {
            alert("No saved route yet. Leave dispatcher open for 5–10 minutes so GPS trail can save.");
            return;
        }

        routeLine = L.polyline(points).addTo(map);
        map.fitBounds(routeLine.getBounds());

        document.getElementById("mapStatus").textContent =
            `Showing saved route trail for ${vehicleId}: ${points.length} point(s).`;

    } catch (err) {
        console.error("Route error:", err);
        alert("Route error.");
    }
}

function clearRoute() {
    routeMarkers.forEach(m => map.removeLayer(m));
    routeMarkers = [];

    if (routeLine) {
        map.removeLayer(routeLine);
        routeLine = null;
    }
}

async function startPage() {
    await loadDrivers();
    await loadVehicles();
    await loadAssignments();
    await loadFleet();
}

startPage();

setInterval(loadFleet, 10000);
</script>

</body>
</html>
