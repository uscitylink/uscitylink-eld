<!DOCTYPE html>
<html>
<head>
    <title>Dispatcher Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #020617;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #38bdf8; }

        .panel {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px;
            margin: 6px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        #map {
            height: 520px;
            border-radius: 10px;
            margin-top: 20px;
        }

        #mapStatus {
            margin-top: 10px;
            color: #22c55e;
            font-weight: bold;
        }

        table {
            width: 100%;
            background: white;
            color: black;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            font-size: 13px;
        }

        th { background: #e5e7eb; }
    </style>
</head>

<body>

<h1>🚛 Dispatcher Dashboard</h1>

<div class="panel">
    <h3>Assign Driver to Vehicle</h3>

    <select id="driverSelect"></select>
    <select id="vehicleSelect"></select>

    <button onclick="assign()">SAVE ASSIGNMENT</button>

    <p id="assignStatus">No assignment yet.</p>
</div>

<div class="panel">
    <h3>Active Assignments</h3>
    <button onclick="loadAssignments()">REFRESH ASSIGNMENTS</button>

    <table>
        <thead>
            <tr>
                <th>Driver ID</th>
                <th>Vehicle ID</th>
                <th>Assigned At</th>
                <th>Active</th>
            </tr>
        </thead>
        <tbody id="assignmentBody"></tbody>
    </table>
</div>

<h3>Live Fleet Map</h3>
<div id="map"></div>
<p id="mapStatus">Loading trucks...</p>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = window.location.origin;

let map = L.map("map").setView([39.5, -98.35], 5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
}).addTo(map);

let markers = [];
let assignmentMap = {};

async function loadDrivers() {
    try {
        const res = await fetch(`${API}/api/admin/drivers`);
        const data = await res.json();

        console.log("Drivers:", data);  // debug

        const select = document.getElementById("driverSelect");
        select.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            select.innerHTML = "<option>No drivers found</option>";
            return;
        }

        data.forEach(d => {
            const option = document.createElement("option");
            option.value = d.driver_id;
            option.textContent = `${d.name} (${d.driver_id})`;
            select.appendChild(option);
        });

    } catch (err) {
        console.error("Driver load error:", err);
    }
}

async function loadVehicles() {
    const res = await fetch(`${API}/api/samsara/gps`);
    const data = await res.json();

    const select = document.getElementById("vehicleSelect");
    select.innerHTML = "";

    const seen = {};

    data.forEach(v => {
        if (!v.vehicle_id) return;
        if (seen[v.vehicle_id]) return;

        seen[v.vehicle_id] = true;

        const option = document.createElement("option");
        option.value = v.vehicle_id;
        option.textContent = v.vehicle_id;
        select.appendChild(option);
    });
}

async function assign() {
    const driver = document.getElementById("driverSelect").value;
    const vehicle = document.getElementById("vehicleSelect").value;

    const res = await fetch(`${API}/api/assignment/create?driver_id=${driver}&vehicle_id=${vehicle}`, {
        method: "POST"
    });

    const data = await res.json();

    document.getElementById("assignStatus").textContent =
        data.message + ": " + driver + " → " + vehicle;

    await loadAssignments();
    await loadFleet();
}

async function loadAssignments() {
    const res = await fetch(`${API}/api/assignment/active`);
    const data = await res.json();

    assignmentMap = {};

    const body = document.getElementById("assignmentBody");
    body.innerHTML = "";

    data.forEach(a => {
        assignmentMap[a.vehicle_id] = a.driver_id;

        body.innerHTML += `
            <tr>
                <td>${a.driver_id}</td>
                <td>${a.vehicle_id}</td>
                <td>${a.assigned_at}</td>
                <td>${a.active}</td>
            </tr>
        `;
    });
}

async function loadFleet() {
    try {
        await loadAssignments();

        const res = await fetch(`${API}/api/samsara/gps`);
        const data = await res.json();

        if (!Array.isArray(data)) {
            document.getElementById("mapStatus").textContent =
                "API error: " + JSON.stringify(data);
            return;
        }

        markers.forEach(marker => map.removeLayer(marker));
        markers = [];

        const latest = {};

        data.forEach(truck => {
            if (!truck.vehicle_id || !truck.latitude || !truck.longitude) return;

            const id = truck.vehicle_id;

            if (!latest[id]) {
                latest[id] = truck;
            } else {
                const oldTime = new Date(latest[id].time || 0);
                const newTime = new Date(truck.time || 0);

                if (newTime > oldTime) {
                    latest[id] = truck;
                }
            }
        });

        let count = 0;

        Object.values(latest).forEach(truck => {
            const lat = parseFloat(truck.latitude);
            const lon = parseFloat(truck.longitude);

            if (isNaN(lat) || isNaN(lon)) return;

            count++;

            const assignedDriver = assignmentMap[truck.vehicle_id] || "Unassigned";

            const marker = L.marker([lat, lon])
                .addTo(map)
                .bindPopup(
                    `<b>Truck:</b> ${truck.vehicle_id}<br>
                     <b>Assigned Driver:</b> ${assignedDriver}<br>
                     <b>Speed:</b> ${truck.speed || 0} mph<br>
                     <b>Time:</b> ${truck.time || ""}<br>
                     <b>GPS:</b> ${lat}, ${lon}`
                );

            markers.push(marker);
        });

        document.getElementById("mapStatus").textContent =
            `Showing latest location for ${count} truck(s).`;

    } catch (err) {
        console.error("Fleet map error:", err);
        document.getElementById("mapStatus").textContent = "Map error.";
    }
}

async function startPage() {
    await loadDrivers();
    await loadVehicles();
    await loadAssignments();
    await loadFleet();
}

startPage();
setInterval(loadFleet, 10000);
</script>

</body>
</html>
