<!DOCTYPE html>
<html>
<head>
    <title>Dispatcher Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #020617;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        #map {
            height: 500px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .panel {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🚛 Dispatcher Dashboard</h1>

<div class="panel">
    <h3>Assign Driver</h3>

    <select id="driverSelect"></select>
    <select id="vehicleSelect"></select>

    <button onclick="assign()">Assign Driver to Vehicle</button>

    <p id="assignStatus"></p>
</div>

<h3>Live Fleet Map</h3>
<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API = "https://uscitylink-eld.onrender.com";

// Map
var map = L.map('map').setView([36, -119], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// Load drivers
async function loadDrivers() {
    const res = await fetch(`${API}/api/admin/drivers`);
    const data = await res.json();

    let select = document.getElementById("driverSelect");
    select.innerHTML = "";

    data.forEach(d => {
        let opt = document.createElement("option");
        opt.value = d.driver_id;
        opt.text = d.name + " (" + d.driver_id + ")";
        select.appendChild(opt);
    });
}

// Load vehicles
async function loadVehicles() {
    const res = await fetch(`${API}/api/admin/vehicles`);
    const data = await res.json();

    let select = document.getElementById("vehicleSelect");
    select.innerHTML = "";

    data.forEach(v => {
        let opt = document.createElement("option");
        opt.value = v.vehicle_id;
        opt.text = v.vehicle_id;
        select.appendChild(opt);
    });
}

// Assign (simple display)
function assign() {
    const driver = document.getElementById("driverSelect").value;
    const vehicle = document.getElementById("vehicleSelect").value;

    document.getElementById("assignStatus").innerText =
        "Assigned " + driver + " → " + vehicle;
}

// Load Samsara GPS
async function loadFleet() {
    try {
        const res = await fetch(`${API}/api/samsara/gps`);
        const data = await res.json();

        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.forEach(truck => {
            if (!truck.latitude || !truck.longitude) return;

            const marker = L.marker([truck.latitude, truck.longitude])
                .addTo(map)
                .bindPopup(
                    "<b>" + truck.vehicle_id + "</b><br>" +
                    "Speed: " + truck.speed + " mph"
                );

            markers.push(marker);
        });

    } catch (err) {
        console.error(err);
    }
}

// Load everything
loadDrivers();
loadVehicles();
loadFleet();

// Auto refresh
setInterval(loadFleet, 10000);

</script>

</body>
</html>
